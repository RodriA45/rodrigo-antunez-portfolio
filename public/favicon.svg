<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Fondo oscuro -->
  <rect width="100" height="100" rx="24" fill="#0a0a0a" />
  
  <!-- Borde exterior sutil -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="#1e1e1e" stroke-width="4" />
  
  <!-- Símbolo de código abstracto y la R -->
  <path d="M 25 35 L 40 50 L 25 65" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <path d="M 75 35 L 60 50 L 75 65" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Letra R central -->
  <text x="50" y="66" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#glow)">R</text>
  
  <!-- Acento neón -->
  <circle cx="75" cy="25" r="5" fill="#3b82f6" filter="url(#glow)" />
</svg>